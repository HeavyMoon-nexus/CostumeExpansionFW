; Costume Expansion FW - LoreBox tooltip keywords.
; Distributes a UNIQUE keyword to each Costume Box slot-token. The displayed text
; for each keyword is supplied at RUNTIME by CostumeExpansionFW.dll (a
; BSScaleformTranslator hook), so it always reflects the box's current contents.
;
; Soft dependency: with "LoreBox - Item and Spell Tooltips" installed, hovering a
; Costume Box token in the inventory shows its packed item names. Without LoreBox,
; nothing reads these keywords and there is no effect. KID auto-creates the
; keywords (they need not exist as records).
;
; Keyword editorID = LoreBox_CEFBox<slot>; <slot> is the token's biped slot.
Keyword = LoreBox_CEFBox44|Armor|0x801~CostumeFW_Boxes.esp
Keyword = LoreBox_CEFBox45|Armor|0x803~CostumeFW_Boxes.esp
