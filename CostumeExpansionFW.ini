; Costume Expansion FW - external config
; Place at: Data\SKSE\Plugins\CostumeExpansionFW.ini
; (under MO2: the CostumeExpansionFW mod's SKSE\Plugins folder, or Overwrite)
;
; Read ONCE when the game starts, BEFORE CEF touches anything - so you can edit
; it without launching the game.

[General]
; Master hard on/off for the whole plugin.
;   1 = enabled (normal; this is also the default if this file is absent)
;   0 = disabled: CEF installs no hooks and does no mesh injection / carrier work.
;
; Use bEnabled=0 as an emergency recovery switch: if a CEF-related crash leaves a
; save that no longer loads, set this to 0 and the save will open with CEF inert.
; (Equivalently, just create an empty file named CEF_DISABLE.txt next to this one -
; its mere presence forces CEF off, no editing needed.)
bEnabled=1
