Keyword = LoreBox_CEFBox53|Armor|0x80F~CostumeFW.esp
Keyword = LoreBox_CEFBox54|Armor|0x810~CostumeFW.esp
Keyword = LoreBox_CEFBox55|Armor|0x811~CostumeFW.esp
